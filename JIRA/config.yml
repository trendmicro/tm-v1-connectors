## Project configuration
# JIRA Project ID or key
project: SPARK 
# JIRA Issue type ID or name
issue_type: Bug
# JIRA Issue summary prefix, leave empty if not required
summary_prefix: synced
# Workbench alerts configuration
# Poll time in seconds
poll_time: 15
# Workbench alerts retrieval start time (UTC timezone).
# Accepts a YAML timestamp (e.g. 2025-08-07 08:20:00); it is sent to Vision One
# in ISO 8601 form (2025-08-07T08:20:00Z). If empty, defaults to 24 hours
# before the request is made.
start_time: 2025-08-07 08:20:00
# Workbench alerts retrieval end time (UTC timezone),
# If empty, defaults to the time the request is made.
end_time:
# Skip closed alerts in Vision One, else create a new JIRA and re-open the alert.
skip_closed: true
## Logging configuration
# Enable debug logging
debug: true
# Enable logging to file instead of stdout
to_file: false
# Log filename
filename: app.log
# Log file max size in MB
file_size: 50
# Number of log files to retain
file_count: 5

## Credentials configuration
v1:
  # Vision One API URL
  url: https://api.region.visionone.trendmicro.com 
  # Vision One API Token
  token: token
jira:
  # JIRA URL
  url: https://company.atlassian.net
  # JIRA Cloud Username (User email address associated to the API Token)
  # Important: leave empty if using JIRA On-premise
  username: <username> 
  # JIRA Cloud API Token or On-premise Personal Authentication Token
  token: <JIRA Token> 

## JIRA to JIRA key-value mapping
fields:
  # field: JIRA field name or key
  # value: JIRA/Vision one value
  - name: reporter
    #under GDPR mode, it should be account ID rather than email address, checking under teams
    value: <userID> 
  - name: assignee
    value: <userID> 
  - name: labels
    value:
      - alert.alert_provider
      - alert.id
  - name: priority
    value: alert.severity
    # Left = JIRA priority name (must exist in your JIRA), right = Vision One
    # severity (critical, high, medium, low). Adjust the JIRA names to match
    # your instance.
    mapping:
      Highest: critical
      High: high
      Medium: medium
      Low: low

## JIRA issue status to Vision One Alert status mapping
status:
  # name: JIRA status name
  # inv: Vision One Alert status. Valid values: Open, In Progress, Closed.
  #      The legacy value "New" is accepted as an alias for "Open".
  # inv_result: (Optional) Vision One investigation result set when syncing
  #      JIRA -> Vision One. Required when inv is "Closed" (Vision One rejects
  #      closing an alert without a result). Valid values:
  #      No Findings, Noteworthy, True Positive, False Positive,
  #      Benign True Positive.
  # fields: (Optional) extra JIRA fields set during the JIRA transition
  #      (Vision One -> JIRA direction), e.g. a resolution when closing.
  - name: To Do
    inv: Open
  - name: In Progress
    inv: In Progress
  - name: Done
    inv: Closed
    inv_result: True Positive
    fields:
      - name: Resolution
        value: Done
